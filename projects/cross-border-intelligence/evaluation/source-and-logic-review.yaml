schema_version: "0.1"
evaluation_id: "source-and-logic-review"
name: "Source and Logic Review"
scope: "Quality gate for cross-border market opportunity analysis reports."
checks:
  - check_id: "src-001"
    dimension: "source reliability"
    question: "Are core claims supported by named sources with dates or retrieval notes?"
    method: "Review the report source log and trace core claims back to source entries."
    pass_condition: "Every market ranking claim has a source or is explicitly marked as an assumption."
    severity: "critical"
  - check_id: "src-002"
    dimension: "source diversity"
    question: "Does the report use separate evidence for demand, supply fit, competition, and entry barriers?"
    method: "Map claims to evidence categories."
    pass_condition: "No final recommendation is based on a single evidence category."
    severity: "high"
  - check_id: "logic-001"
    dimension: "logic validity"
    question: "Does the recommendation follow from the evidence and metric scores?"
    method: "Compare final recommendation, score table, and written rationale."
    pass_condition: "The recommended market is either the top-scoring market or the exception is explicitly justified."
    severity: "critical"
  - check_id: "metric-001"
    dimension: "metric consistency"
    question: "Are metric scores assigned with consistent rules across markets?"
    method: "Review scoring rationales side by side."
    pass_condition: "Similar evidence produces similar component scores unless differences are explained."
    severity: "high"
  - check_id: "decision-001"
    dimension: "decision usefulness"
    question: "Does the report tell the user what to test next?"
    method: "Review the final recommendation and 90-day plan."
    pass_condition: "The output includes target market, product angle or SKU, channel, validation action, and risk."
    severity: "critical"
  - check_id: "risk-001"
    dimension: "risk disclosure"
    question: "Are uncertainty, missing data, and entry risks visible to the reader?"
    method: "Review risk section and confidence notes."
    pass_condition: "Known uncertainty and missing evidence are stated near the recommendation."
    severity: "medium"
outcome_levels:
  - label: "approved"
    definition: "Ready to publish or send to the user after copy editing."
  - label: "revise"
    definition: "Useful analysis, but one or more high or medium issues must be corrected."
  - label: "blocked"
    definition: "Cannot be used for decision support because a critical check failed."
